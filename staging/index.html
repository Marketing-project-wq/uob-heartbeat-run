    background: var(--card); border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 26px 18px; }
  .sidebar-brand { display: flex; align-items: center; gap: 5px; padding: 0 6px; }
  .sidebar-brand img { height: 20px; width: auto; display: block; }
  .sidebar-x { font-family: var(--font-ui); font-weight: 800; font-size: 11.5px; color: var(--muted); letter-spacing: .3px; border-left: 1px solid var(--line); padding-left: 9px; }
  .sidebar-brand img.sidebar-20fit { height: 10px; width: auto; display: block; }
  .sidebar-tag { font-family: var(--font-ui); font-weight: 700; font-size: 10.5px; letter-spacing: 1.5px; color: var(--blue); margin: 16px 8px 20px; text-transform: uppercase; }
  .sidebar-nav { display: flex; flex-direction: column; gap: 3px; }
  .side-link { display: flex; align-items: center; gap: 13px; padding: 12px 14px; border: none; background: none; cursor: pointer;
    border-radius: 13px; font-family: var(--font-ui); font-weight: 700; font-size: 15px; color: var(--muted); text-align: left; width: 100%; transition: background .16s, color .16s; }
  .side-link:hover { background: rgba(2,32,71,.05); color: var(--ink); }
  .side-link.is-active { background: rgba(0,96,192,.1); color: var(--blue); }
  .side-cta { margin-top: 18px; display: flex; align-items: center; justify-content: center; gap: 9px; border: none; cursor: pointer;
    border-radius: 14px; padding: 14px 0; background: var(--red); color: #fff; font-family: var(--font-display); font-weight: 800; font-size: 15.5px; box-shadow: 0 10px 22px -8px rgba(244,37,60,.6); }
  .side-cta:hover { filter: brightness(1.05); }
  .side-user { margin-top: auto; display: flex; align-items: center; gap: 11px; border: none; background: none; cursor: pointer; padding: 10px; border-radius: 14px; text-align: left; }
  .side-user:hover { background: rgba(2,32,71,.05); }
  .side-user-name { font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--ink); }
  .side-user-sub { font-family: var(--font-ui); font-size: 11.5px; color: var(--muted); margin-top: 1px; }

  .tabbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; background: rgba(255,255,255,0.92);

  //  ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ¢ jika redirect penuh (fallback) ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ simpan status & bersihkan URL
  (function () {
    try {
      var p = new URLSearchParams(window.location.search);
      var code = p.get('code'), err = p.get('error');
      if (!code && !err) return;
      if (window.opener && window.opener !== window) {

      }
    } catch (e) {}
  })();

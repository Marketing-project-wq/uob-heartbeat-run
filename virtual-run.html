<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Virtual Run UOB</title>
  <style>
    :root{
      --blue:#0060C0; --blue-rich:#0A56AE; --deep:#00305f; --red:#F4253C;
      --ink:#0E2138; --muted:#6A7C92; --line:#E3E9F2; --card:#fff; --bg:#EEF2F8;
      --ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);font-family:var(--ui);color:var(--ink)}
    .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    /* top bar */
    .topbar{background:var(--deep);background-image:linear-gradient(115deg,#052B63,#0A56AE 55%,#2E6BC4);color:#fff;padding:18px 20px 16px}
    .topbar .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;letter-spacing:.3px}
    .topbar .sub{font-size:11px;letter-spacing:2px;opacity:.85;font-weight:700;margin-top:3px}
    .content{flex:1;padding:18px 16px 90px}
    /* generic */
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px}
    h2{font-size:20px;font-weight:800;letter-spacing:-.4px;margin:0 0 4px}
    p.lead{font-size:13.5px;color:var(--muted);line-height:1.55;margin:0 0 16px}
    label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.3px;margin:0 0 6px}
    input[type=text],input[type=email],input[type=tel],input[type=number]{
      width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-size:15px;font-family:var(--ui);
      color:var(--ink);outline:none;background:var(--bg);margin-bottom:14px}
    input:focus{border-color:var(--blue)}
    .btn{width:100%;border:none;border-radius:14px;padding:15px 0;font-weight:800;font-size:15.5px;font-family:var(--ui);cursor:pointer;color:#fff;background:var(--blue-rich)}
    .btn.red{background:var(--red)}
    .btn:disabled{background:rgba(2,32,71,.12);color:var(--muted);cursor:not-allowed}
    .btn.ghost{background:transparent;color:var(--blue);border:1.5px solid var(--line)}
    .center{text-align:center}
    .big{font-family:var(--ui);font-weight:800;font-size:40px;letter-spacing:-1.5px;line-height:1}
    .muted{color:var(--muted)}
    .pill{display:inline-block;padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:700}
    .disclaimer{background:rgba(244,37,60,.06);border:1px solid rgba(244,37,60,.2);border-radius:13px;padding:13px 14px;font-size:12.5px;line-height:1.5;color:var(--ink);margin-bottom:14px}
    .check-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;cursor:pointer}
    .check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;margin-top:1px}
    .check-box.on{background:var(--blue);border-color:var(--blue)}
    /* tabbar */
    .tabbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
    .tab{flex:1;text-align:center;border:none;background:none;cursor:pointer;font-family:var(--ui);font-weight:700;font-size:11.5px;color:var(--muted);padding:6px 0}
    .tab.on{color:var(--blue)}
    .tab .ic{font-size:20px;display:block;margin-bottom:2px}
    /* leaderboard rows */
    .lb-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-top:1px solid var(--line)}
    .lb-row:first-child{border-top:none}
    .rank{width:26px;text-align:center;font-weight:800;color:var(--muted)}
    .rank.top{color:var(--red)}
    .lb-name{flex:1;font-weight:700;font-size:14px}
    .lb-kcp{font-size:11.5px;color:var(--muted);font-weight:600}
    .lb-km{font-weight:800;color:var(--blue);font-size:15px}
    .hide{display:none}
    .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--deep);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:50;opacity:0;transition:opacity .2s;max-width:90%}
    .toast.show{opacity:1}
    .preview-flag{background:#E8B339;color:#3a2a00;text-align:center;font-size:11px;font-weight:800;padding:5px;letter-spacing:.5px}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="previewFlag" class="preview-flag hide">⚠️ PREVIEW MODE — not the live event</div>
    <div class="topbar">
      <div class="brand">❤️ Virtual Run UOB</div>
      <div class="sub">UOB HEARTBEAT RUN × 20FIT</div>
    </div>
    <div class="content" id="content">
      <div class="spinner"></div>
      <p class="center muted" id="bootMsg">Checking event time…</p>
    </div>
  </div>
  <div class="tabbar hide" id="tabbar">
    <button class="tab on" data-tab="run"><span class="ic">🏃</span>Log Run</button>
    <button class="tab" data-tab="board"><span class="ic">🏆</span>Leaderboard</button>
    <button class="tab" data-tab="profile"><span class="ic">👤</span>Profile</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var SUPA = 'https://cpvzwqptzcxnwzfzgrmt.supabase.co';
  var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnp3cXB0emN4bnd6Znpncm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzE0MzksImV4cCI6MjA5MTIwNzQzOX0.DIP-tTFxa3GHMhT6b1Tq-Zz0a24P-vbU9ixEtITbqpI';
  // Jendela acara: 29 Agustus 2026, 06:00–09:00 WIB (UTC+7).
  var START = Date.UTC(2026, 7, 28, 23, 0, 0); // 06:00 WIB
  var END   = Date.UTC(2026, 7, 29, 2, 0, 0);  // 09:00 WIB
  var PROFILE_KEY = 'uob_vr_profile';
  var DONE_KEY = 'uob_vr_done';
  var content = document.getElementById('content');
  var tabbar = document.getElementById('tabbar');
  var toastEl = document.getElementById('toast');
  var clockOffset = 0; // serverNow - Date.now()
  var tab = 'run';

  function toast(m){ toastEl.textContent = m; toastEl.classList.add('show'); setTimeout(function(){ toastEl.classList.remove('show'); }, 2600); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  function now(){ return Date.now() + clockOffset; }
  function getProfile(){ try{ return JSON.parse(localStorage.getItem(PROFILE_KEY)||'null'); }catch(e){ return null; } }
  function getDone(){ try{ return JSON.parse(localStorage.getItem(DONE_KEY)||'null'); }catch(e){ return null; } }

  // Waktu dari SERVER (tidak bisa diakali jam HP). Fallback ke jam perangkat.
  function serverNow(){
    return fetch(SUPA + '/rest/v1/', { method:'HEAD', headers:{ apikey: ANON } })
      .then(function(r){ var d = r.headers.get('date'); var t = d ? Date.parse(d) : NaN; return isNaN(t) ? Date.now() : t; })
      .catch(function(){ return Date.now(); });
  }

  function isPreview(){
    try{
      if (localStorage.getItem('uob_vr_preview') === '1') return true;
      if (location.search.indexOf('preview=1') !== -1) { localStorage.setItem('uob_vr_preview','1'); return true; }
    }catch(e){}
    return false;
  }

  function fmtCountdown(ms){
    if (ms < 0) ms = 0; var s = Math.floor(ms/1000);
    var d = Math.floor(s/86400); s-=d*86400; var h=Math.floor(s/3600); s-=h*3600; var m=Math.floor(s/60); s-=m*60;
    return (d>0? d+'d ':'') + String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }

  // ── Gate ──────────────────────────────────────────────
  function boot(){
    var preview = isPreview();
    serverNow().then(function(t){
      clockOffset = t - Date.now();
      if (preview){ document.getElementById('previewFlag').classList.remove('hide'); openApp(); return; }
      gate();
    });
  }
  function gate(){
    var n = now();
    if (n < START){ renderLocked(); }
    else if (n > END){ renderClosed(); }
    else { openApp(); }
  }
  function renderLocked(){
    tabbar.classList.add('hide');
    content.innerHTML =
      '<div class="card center">'
      + '<div class="pill" style="background:rgba(0,96,192,.1);color:var(--blue)">LOCKED</div>'
      + '<h2 style="margin-top:14px">Virtual Run opens soon</h2>'
      + '<p class="lead">The Virtual Run UOB is only open on <b>29 August 2026, 06:00–09:00 WIB</b>. Come back during that window to register and submit your run.</p>'
      + '<div class="muted" style="font-size:11px;font-weight:700;letter-spacing:.5px">OPENS IN</div>'
      + '<div class="big" id="cd" style="color:var(--blue);margin-top:6px">--:--:--</div>'
      + '</div>';
    tick();
    function tick(){ var el=document.getElementById('cd'); if(!el) return; el.textContent = fmtCountdown(START - now()); if (now() >= START){ gate(); return; } setTimeout(tick, 1000); }
  }
  function renderClosed(){
    tabbar.classList.add('hide');
    content.innerHTML =
      '<div class="card center">'
      + '<div class="pill" style="background:rgba(244,37,60,.1);color:var(--red)">CLOSED</div>'
      + '<h2 style="margin-top:14px">The Virtual Run has ended</h2>'
      + '<p class="lead">Submissions were open on 29 August 2026, 06:00–09:00 WIB and are now closed. Thank you for joining the UOB Heartbeat Run!</p>'
      + '<button class="btn" id="seeBoard">See final leaderboard</button>'
      + '</div>';
    document.getElementById('seeBoard').onclick = function(){ tabbar.classList.remove('hide'); tab='board'; renderTab(); };
  }

  // ── App (open) ────────────────────────────────────────
  function openApp(){
    tabbar.classList.remove('hide');
    Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(b){
      b.onclick = function(){ tab = b.getAttribute('data-tab'); syncTabs(); renderTab(); };
    });
    // kalau belum ada profil → mulai dari Profile
    if (!getProfile()) tab = 'profile';
    syncTabs(); renderTab();
  }
  function syncTabs(){ Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(b){ b.classList.toggle('on', b.getAttribute('data-tab')===tab); }); }

  function renderTab(){
    // re-check window setiap render (kalau lewat 09:00 saat dibuka)
    if (!isPreview()){ var n=now(); if (n<START){ renderLocked(); return; } if (n>END){ renderClosed(); return; } }
    if (tab==='profile') renderProfile();
    else if (tab==='board') renderBoard();
    else renderRun();
  }

  // Profile = isi data peserta
  function renderProfile(){
    var p = getProfile() || {};
    content.innerHTML =
      '<div class="card">'
      + '<h2>Your details</h2>'
      + '<p class="lead">Enter your details to take part in the Virtual Run. These are used for your race entry and the leaderboard.</p>'
      + '<label>FULL NAME</label><input id="f_name" type="text" placeholder="Full name as per ID" value="'+esc(p.full_name)+'">'
      + '<label>EMAIL</label><input id="f_email" type="email" inputmode="email" placeholder="your@email.com" value="'+esc(p.email)+'">'
      + '<label>PHONE NUMBER</label><input id="f_phone" type="tel" inputmode="tel" placeholder="0812xxxxxxxx" value="'+esc(p.phone)+'">'
      + '<label>NIK (ID NUMBER)</label><input id="f_nik" type="text" inputmode="numeric" placeholder="16-digit NIK" value="'+esc(p.nik)+'">'
      + '<label>KCP (BRANCH)</label><input id="f_kcp" type="text" placeholder="Type your branch name" value="'+esc(p.kcp)+'">'
      + '<button class="btn" id="saveProfile">Save details</button>'
      + '</div>';
    document.getElementById('saveProfile').onclick = function(){
      var prof = {
        full_name: document.getElementById('f_name').value.trim(),
        email: document.getElementById('f_email').value.trim(),
        phone: document.getElementById('f_phone').value.trim(),
        nik: document.getElementById('f_nik').value.trim(),
        kcp: document.getElementById('f_kcp').value.trim()
      };
      if (prof.full_name.length < 2) return toast('Please enter your full name.');
      if (!/.+@.+\..+/.test(prof.email)) return toast('Please enter a valid email.');
      if (prof.phone.replace(/\D/g,'').length < 8) return toast('Please enter a valid phone number.');
      if (prof.nik.replace(/\D/g,'').length < 8) return toast('Please enter a valid NIK.');
      if (prof.kcp.length < 2) return toast('Please enter your branch (KCP).');
      try{ localStorage.setItem(PROFILE_KEY, JSON.stringify(prof)); }catch(e){}
      toast('Saved ✓');
      tab='run'; syncTabs(); renderTab();
    };
  }

  // Log Run = sekali submit + disclaimer
  function renderRun(){
    var p = getProfile();
    if (!p){ tab='profile'; syncTabs(); renderProfile(); return; }
    var done = getDone();
    if (done){
      content.innerHTML =
        '<div class="card center">'
        + '<div class="pill" style="background:rgba(14,159,110,.12);color:#0E7A52">SUBMITTED ✓</div>'
        + '<h2 style="margin-top:14px">Your run is in!</h2>'
        + '<div class="big" style="color:var(--blue);margin:12px 0 2px">'+esc(done.distance_km)+' <span style="font-size:18px">km</span></div>'
        + '<p class="lead">Thanks '+esc(p.full_name.split(" ")[0])+'! You\'ve submitted your Virtual Run result. Each participant can submit once only.</p>'
        + '<button class="btn ghost" id="goBoard">View leaderboard</button>'
        + '</div>';
      document.getElementById('goBoard').onclick=function(){ tab='board'; syncTabs(); renderTab(); };
      return;
    }
    var checked=false;
    content.innerHTML =
      '<div class="card">'
      + '<h2>Submit your run</h2>'
      + '<p class="lead">Logging as <b>'+esc(p.full_name)+'</b> · '+esc(p.kcp)+'</p>'
      + '<div class="disclaimer">⚠️ <b>One submission only.</b> You can submit your Virtual Run result <b>just once</b> — it cannot be changed afterwards. Make sure your distance is correct before you submit.</div>'
      + '<label>DISTANCE COMPLETED (KM)</label><input id="f_km" type="number" inputmode="decimal" step="0.01" min="0" placeholder="e.g. 5.2">'
      + '<div class="check-row" id="agreeRow"><div class="check-box" id="agreeBox"></div><div style="font-size:12.5px;line-height:1.5;color:var(--ink)">I understand I can submit my result only once, and confirm my distance is correct.</div></div>'
      + '<button class="btn red" id="submitRun" disabled>Submit my run (final)</button>'
      + '</div>';
    var box=document.getElementById('agreeBox'), row=document.getElementById('agreeRow'), btn=document.getElementById('submitRun');
    row.onclick=function(){ checked=!checked; box.classList.toggle('on',checked); box.textContent=checked?'✓':''; btn.disabled=!checked; };
    btn.onclick=function(){
      var km = parseFloat(String(document.getElementById('f_km').value).replace(',','.'));
      if (!(km>0)) return toast('Please enter your distance in km.');
      if (!checked) return;
      btn.disabled=true; btn.textContent='Submitting…';
      submitRun(p, km).then(function(res){
        if (res.ok){
          try{ localStorage.setItem(DONE_KEY, JSON.stringify({ distance_km: km })); }catch(e){}
          renderTab();
        } else if (res.dup){
          try{ localStorage.setItem(DONE_KEY, JSON.stringify({ distance_km: km })); }catch(e){}
          toast('This NIK has already submitted.');
          renderTab();
        } else {
          btn.disabled=false; btn.textContent='Submit my run (final)';
          toast(res.msg || 'Could not submit. Please try again.');
        }
      });
    };
  }

  function submitRun(p, km){
    var body = { full_name:p.full_name, email:p.email, phone:p.phone, nik:p.nik, kcp:p.kcp, distance_km:km };
    return fetch(SUPA + '/rest/v1/uob_virtual_run', {
      method:'POST',
      headers:{ apikey:ANON, Authorization:'Bearer '+ANON, 'Content-Type':'application/json', Prefer:'return=minimal' },
      body: JSON.stringify(body)
    }).then(function(r){
      if (r.status===201 || r.status===200 || r.status===204) return { ok:true };
      if (r.status===409) return { ok:false, dup:true };
      return r.text().then(function(t){ return { ok:false, msg:'Submit failed ('+r.status+')' }; });
    }).catch(function(){ return { ok:false, msg:'Network error — check your connection.' }; });
  }

  // Leaderboard
  function renderBoard(){
    content.innerHTML = '<div class="card"><h2>Leaderboard</h2><p class="lead">Virtual Run UOB — live standings by distance.</p><div id="lbList"><div class="spinner"></div></div></div>';
    fetch(SUPA + '/rest/v1/uob_virtual_run?select=full_name,kcp,distance_km&order=distance_km.desc&limit=100', { headers:{ apikey:ANON, Authorization:'Bearer '+ANON } })
      .then(function(r){ return r.json(); })
      .then(function(rows){
        var el = document.getElementById('lbList'); if(!el) return;
        if (!rows || !rows.length){ el.innerHTML='<p class="center muted" style="padding:20px 0">No runs submitted yet — be the first!</p>'; return; }
        el.innerHTML = rows.map(function(r,i){
          return '<div class="lb-row"><div class="rank '+(i<3?'top':'')+'">'+(i+1)+'</div>'
            + '<div class="lb-name">'+esc(r.full_name)+'<div class="lb-kcp">'+esc(r.kcp||'')+'</div></div>'
            + '<div class="lb-km">'+esc(r.distance_km)+' km</div></div>';
        }).join('');
      })
      .catch(function(){ var el=document.getElementById('lbList'); if(el) el.innerHTML='<p class="center muted" style="padding:20px 0">Could not load the leaderboard. Pull to refresh.</p>'; });
  }

  boot();
})();
</script>
</body>
</html>
